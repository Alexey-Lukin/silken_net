# Kredis Redis configuration — used for distributed locks (Web3 nonce management).
#
# DB ISOLATION STRATEGY:
#   DB 0 → Sidekiq (job queues) — configured in config/initializers/sidekiq.rb
#   DB 1 → Kredis (distributed locks) — configured here
#
# This separation prevents a telemetry queue flood from evicting Web3 nonce locks,
# which would cause EVM nonce collisions and double-spend vulnerabilities.

production: &production
  url: <%= ENV.fetch("KREDIS_REDIS_URL", "#{ENV.fetch("REDIS_URL", "redis://localhost:6379")}/1") %>
  timeout: 3

development:
  url: <%= ENV.fetch("KREDIS_REDIS_URL", "redis://localhost:6379/1") %>
  timeout: 1

test:
  url: <%= ENV.fetch("KREDIS_REDIS_URL", "redis://localhost:6379/1") %>
  timeout: 1
