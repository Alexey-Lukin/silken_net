# Staging destination — deployed automatically from main branch after CI passes.
# Uses a lighter server for developer testing and review.
# Deploy manually: kamal deploy -d staging

# Staging server IP (from Terraform output: staging_server_ip).
servers:
  web:
    - 192.168.0.2

# Proxy: no SSL on staging (HTTP only for development use).
# proxy:
#   ssl: true
#   host: staging.silken.net

# Override environment for staging.
env:
  clear:
    RAILS_ENV: production
    SOLID_QUEUE_IN_PUMA: true
    # RAILS_LOG_LEVEL: debug
