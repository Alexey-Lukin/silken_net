# Name of your application. Used to uniquely configure containers.
service: silken_net

# Name of the container image.
image: silken_net

# Deploy to these servers (populated from Terraform outputs).
servers:
  web:
    - 192.168.0.1
  # job:
  #   hosts:
  #     - 192.168.0.1
  #   cmd: bin/jobs

# Kamal proxy configuration.
# SSL auto-certification via Let's Encrypt. Requires config.assume_ssl and config.force_ssl in production.rb.
# proxy:
#   ssl: true
#   host: silken.net

# Proxy boot configuration: publish ports including CoAP UDP.
boot:
  proxy:
    publish:
      - "80:80"
      - "443:443"
      - "5683:5683/udp"

# Google Artifact Registry for Docker images.
# Run `gcloud auth configure-docker <region>-docker.pkg.dev` before first deploy.
registry:
  server: europe-west1-docker.pkg.dev
  username: _json_key_base64
  password:
    - GCP_ARTIFACT_REGISTRY_KEY

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - REDIS_URL
    - KREDIS_REDIS_URL
  clear:
    # Run the Solid Queue Supervisor inside the web server's Puma process to do jobs.
    # When you start using multiple servers, you should split out job processing to a dedicated machine.
    SOLID_QUEUE_IN_PUMA: true

    # Set number of processes dedicated to Solid Queue (default: 1)
    # JOB_CONCURRENCY: 3

    # Set number of cores available to the application on each server (default: 1).
    # WEB_CONCURRENCY: 2

    # Log everything from Rails
    # RAILS_LOG_LEVEL: debug

# Aliases are triggered with "bin/kamal <alias>". You can overwrite arguments on invocation:
# "bin/kamal logs -r job" will tail logs from the first server in the job section.
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Persistent storage volume for Active Storage files.
volumes:
  - "silken_net_storage:/rails/storage"

# Bridge fingerprinted assets between versions to avoid 404 on in-flight requests.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64

# SSH user for connecting to servers
ssh:
  user: deploy
